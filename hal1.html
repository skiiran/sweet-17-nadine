<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>For Nadine 💕</title>
    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Dancing+Script:wght@400;600;700&family=Poppins:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        width: 100%;
      }

      body {
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #ffd0d9, #ffd9e2, #ffe3ec, #ffecf2);
        background-size: 400% 400%;
        font-family: "Poppins", sans-serif;
        position: relative;
        overflow: hidden;
      }

      .overlay {
        position: absolute;
        inset: 0;
        background:
          radial-gradient(
            circle at 30% 50%,
            rgba(255, 220, 230, 0.4) 0%,
            transparent 60%
          ),
          radial-gradient(
            circle at 70% 50%,
            rgba(255, 200, 215, 0.3) 0%,
            transparent 60%
          );
        pointer-events: none;
        z-index: 1;
      }

      /* Tulip Container */
      .tulip-container {
        position: absolute;
        width: 100%;
        height: 100%;
        z-index: 2;
        pointer-events: none;
      }

      .tulip {
        position: absolute;
        font-size: 1.8rem;
        filter: drop-shadow(0 0 5px rgba(255, 150, 180, 0.2));
        animation: floatTulip 35s infinite ease-in-out;
        opacity: 0.25;
      }

      @keyframes floatTulip {
        0% {
          transform: translateY(100vh) rotate(0deg) scale(0.4);
          opacity: 0;
        }
        20% {
          opacity: 0.3;
          transform: translateY(70vh) rotate(3deg) scale(0.7);
        }
        50% {
          opacity: 0.5;
          transform: translateY(40vh) rotate(-2deg) scale(0.9);
        }
        80% {
          opacity: 0.3;
          transform: translateY(15vh) rotate(2deg) scale(0.7);
        }
        100% {
          transform: translateY(-20vh) rotate(0deg) scale(0.4);
          opacity: 0;
        }
      }

      /* Partikel */
      .particles {
        position: absolute;
        width: 100%;
        height: 100%;
        z-index: 3;
        pointer-events: none;
      }

      .particle {
        position: absolute;
        width: 2px;
        height: 2px;
        background: rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        filter: blur(1px);
        animation: floatParticle 30s linear infinite;
        opacity: 0.15;
      }

      @keyframes floatParticle {
        0% {
          transform: translateY(100vh) translateX(0);
          opacity: 0;
        }
        30% {
          opacity: 0.2;
        }
        100% {
          transform: translateY(-20vh) translateX(30px);
          opacity: 0;
        }
      }

      /* FULL SCREEN PHOTO */
      .fullscreen-photo {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 100;
        cursor: pointer;
        overflow: hidden;
      }

      .fullscreen-photo img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center;
        display: block;
      }

      /* Tap text */
      .tap-text {
        position: absolute;
        bottom: 40px;
        left: 50%;
        transform: translateX(-50%);
        color: #ffffff;
        font-size: 0.85rem;
        font-family: "Poppins", sans-serif;
        font-weight: 300;
        letter-spacing: 3px;
        text-transform: uppercase;
        text-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(2px);
        padding: 8px 18px;
        border-radius: 40px;
        border: 1px solid rgba(255, 255, 255, 0.25);
        z-index: 102;
        opacity: 0.8;
        animation: softPulse 2.5s infinite;
        white-space: nowrap;
      }

      @keyframes softPulse {
        0%,
        100% {
          opacity: 0.6;
        }
        50% {
          opacity: 1;
        }
      }

      /* MAIN CONTENT */
      .container {
        position: relative;
        z-index: 10;
        width: 100%;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        opacity: 0;
        pointer-events: none;
      }

      .container.show {
        opacity: 1;
        pointer-events: all;
      }

      /* TEXT CONTAINER - SEMUA TEKS DI TENGAH */
      .text-container {
        position: relative;
        width: 100%;
        height: 300px; /* Fixed height untuk konsistensi */
        display: flex;
        justify-content: center;
        align-items: center;
      }

      /* GREETING - HAIII.... */
      .greeting {
        color: #d44e6c;
        font-size: 5.5rem;
        font-weight: 400;
        font-family: "Dancing Script", cursive;
        text-shadow: 0 0 30px rgba(255, 100, 150, 0.7);
        letter-spacing: 6px;
        text-align: center;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        margin: 0;
        line-height: 1.2;
        width: 100%;
        opacity: 0;
      }

      /* MAIN TEXT WRAPPER */
      .main-text-wrapper {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 0.8rem;
      }

      .line-one {
        color: #b34e6e;
        font-size: 3.8rem;
        font-weight: 600;
        letter-spacing: 4px;
        text-shadow: 0 0 30px rgba(255, 150, 180, 0.7);
        font-family: "Playfair Display", serif;
        text-align: center;
        margin: 0;
        line-height: 1.3;
        opacity: 0;
        transform: scale(0.8);
        width: 100%;
      }

      .line-two {
        font-size: 5rem;
        font-family: "Dancing Script", cursive;
        background: linear-gradient(45deg, #d44e6c, #ff6f91, #ffb3c6, #ff8da1);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-size: 400% 400%;
        text-shadow: 0 0 40px rgba(255, 100, 150, 0.5);
        letter-spacing: 3px;
        text-align: center;
        margin: 0;
        line-height: 1.3;
        opacity: 0;
        transform: scale(0.8);
        width: 100%;
      }

      .loading-container {
        position: absolute;
        bottom: 120px;
        left: 50%;
        transform: translateX(-50%);
        text-align: center;
        z-index: 15;
        width: auto;
        display: flex;
        flex-direction: column;
        align-items: center;
        opacity: 0;
      }

      .loading-bar {
        width: 280px;
        height: 2px;
        background: rgba(200, 120, 140, 0.15);
        border-radius: 3px;
        overflow: hidden;
        box-shadow: 0 0 15px rgba(255, 150, 180, 0.3);
      }

      .loading-progress {
        width: 0%;
        height: 100%;
        background: linear-gradient(90deg, #ffb6c1, #ff6f91, #ffb3c6);
        background-size: 300% 100%;
      }

      .loading-text {
        color: #b34e6e;
        font-size: 0.8rem;
        margin-top: 1rem;
        letter-spacing: 3px;
        font-weight: 300;
        text-transform: uppercase;
        text-shadow: 0 0 10px rgba(255, 150, 180, 0.4);
        opacity: 0;
      }

      /* Orbs */
      .orb {
        position: absolute;
        border-radius: 50%;
        background: radial-gradient(
          circle at 30% 30%,
          rgba(255, 200, 220, 0.2),
          rgba(255, 150, 180, 0.1)
        );
        filter: blur(80px);
        z-index: 0;
        animation: orbFloat 35s ease-in-out infinite;
      }

      .orb1 {
        width: 600px;
        height: 600px;
        top: -200px;
        right: -150px;
      }

      .orb2 {
        width: 700px;
        height: 700px;
        bottom: -300px;
        left: -200px;
        animation-delay: -10s;
      }

      @keyframes orbFloat {
        0%,
        100% {
          transform: translate(0, 0) scale(1);
        }
        33% {
          transform: translate(30px, -30px) scale(1.05);
        }
        66% {
          transform: translate(-20px, 20px) scale(0.95);
        }
      }

      @media (max-width: 768px) {
        .greeting {
          font-size: 4rem;
        }
        .line-one {
          font-size: 2.4rem;
        }
        .line-two {
          font-size: 3.5rem;
        }
        .loading-container {
          bottom: 80px;
        }
        .tulip {
          font-size: 1.3rem;
        }
        .tap-text {
          font-size: 0.75rem;
          bottom: 30px;
          padding: 6px 14px;
        }
      }
    </style>
  </head>
  <body>
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>

    <!-- Tulip Container -->
    <div class="tulip-container" id="tulipContainer"></div>

    <div class="overlay"></div>
    <div class="particles" id="particles"></div>

    <!-- FULL SCREEN PHOTO -->
    <div class="fullscreen-photo" id="fullscreenPhoto">
      <img src="image/foto1.jpeg" alt="Nadine" />
      <div class="tap-text">✦ tap anywhere to continue ✦</div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="container" id="mainContainer">
      <!-- TEXT CONTAINER - SEMUA TEKS DI DALAM SINI -->
      <div class="text-container">
        <!-- GREETING - HAIII.... -->
        <div class="greeting" id="greeting">Haiii....</div>

        <!-- MAIN TEXT WRAPPER -->
        <div class="main-text-wrapper" id="mainTextWrapper">
          <span class="line-one" id="lineOne">Happy Sweet Seventeen</span>
          <span class="line-two" id="lineTwo">Nadineee 💕</span>
        </div>
      </div>

      <!-- LOADING (TETAP DI BAWAH) -->
      <div class="loading-container" id="loadingContainer">
        <div class="loading-bar">
          <div class="loading-progress" id="loadingProgress"></div>
        </div>
        <div class="loading-text" id="loadingText">
          go to the special page...
        </div>
      </div>
    </div>

    <script>
      (function () {
        // CREATE TULIPS
        const tulipContainer = document.getElementById("tulipContainer");
        const flowerEmojis = ["🌷", "🌸", "🌼"];

        for (let i = 0; i < 25; i++) {
          const flower = document.createElement("div");
          flower.className = "tulip";
          flower.textContent =
            flowerEmojis[Math.floor(Math.random() * flowerEmojis.length)];
          flower.style.left = Math.random() * 100 + "%";
          flower.style.animationDelay = Math.random() * 10 + "s";
          flower.style.animationDuration = 25 + Math.random() * 15 + "s";
          flower.style.fontSize = 1 + Math.random() * 1.3 + "rem";

          const baseOpacity = 0.15 + Math.random() * 0.2;
          flower.style.opacity = baseOpacity;

          flower.style.transform = `rotate(${Math.random() * 30}deg)`;
          tulipContainer.appendChild(flower);
        }

        // CREATE PARTICLES
        const particles = document.getElementById("particles");
        for (let i = 0; i < 20; i++) {
          const p = document.createElement("div");
          p.className = "particle";
          p.style.left = Math.random() * 100 + "%";
          p.style.animationDelay = Math.random() * 8 + "s";
          p.style.animationDuration = 20 + Math.random() * 15 + "s";
          particles.appendChild(p);
        }

        // ELEMENTS
        const fullscreenPhoto = document.getElementById("fullscreenPhoto");
        const mainContainer = document.getElementById("mainContainer");
        const greeting = document.getElementById("greeting");
        const lineOne = document.getElementById("lineOne");
        const lineTwo = document.getElementById("lineTwo");
        const loadingContainer = document.getElementById("loadingContainer");
        const loadingProgress = document.getElementById("loadingProgress");
        const loadingText = document.getElementById("loadingText");

        // FADE IN PHOTO
        gsap.set(fullscreenPhoto, { opacity: 0 });
        gsap.to(fullscreenPhoto, {
          opacity: 1,
          duration: 3,
          ease: "power2.out",
        });

        // SEMUA ELEMEN MAIN DALAM KEADAAN HIDDEN
        gsap.set(mainContainer, {
          opacity: 0,
          pointerEvents: "none",
        });

        gsap.set([greeting, lineOne, lineTwo, loadingContainer, loadingText], {
          opacity: 0,
          scale: 0.8,
          y: 0,
        });

        // KLIK FOTO
        fullscreenPhoto.addEventListener("click", function () {
          // HILANGKAN FOTO
          gsap.to(fullscreenPhoto, {
            opacity: 0,
            duration: 1.2,
            ease: "power2.inOut",
            onComplete: function () {
              fullscreenPhoto.style.display = "none";
            },
          });

          // TAMPILKAN MAIN CONTAINER
          gsap.set(mainContainer, {
            opacity: 1,
            pointerEvents: "all",
          });

          // MULAI ANIMASI
          startTextAnimation();
        });

        function startTextAnimation() {
          const tl = gsap.timeline({
            defaults: {
              ease: "back.out(1.4)",
            },
          });

          // 1. GREETING "Haiii...." MUNCUL (DI TENGAH)
          tl.to(greeting, {
            opacity: 1,
            scale: 1,
            duration: 1.2,
            filter: "blur(0px)",
          })
            // GREETING BERGOYANG
            .to(
              greeting,
              {
                scale: 1.05,
                duration: 0.8,
                repeat: 1,
                yoyo: true,
                ease: "sine.inOut",
              },
              "-=0.5",
            )
            // GREETING HILANG (FADE OUT, TETAP DI TENGAH)
            .to(
              greeting,
              {
                opacity: 0,
                scale: 0.9,
                duration: 0.8,
                ease: "power2.in",
              },
              "+=1.5",
            )

            // 2. LINE ONE MUNCUL (DI TENGAH)
            .to(
              lineOne,
              {
                opacity: 1,
                scale: 1,
                duration: 1.2,
                filter: "blur(0px)",
              },
              "-=0.3",
            )

            // 3. LINE TWO MUNCUL (DI TENGAH)
            .to(
              lineTwo,
              {
                opacity: 1,
                scale: 1,
                duration: 1.2,
                filter: "blur(0px)",
              },
              "-=0.5",
            )

            // EFEK GLOW LINE ONE
            .to(
              lineOne,
              {
                textShadow:
                  "0 0 40px rgba(255, 150, 180, 0.9), 0 0 70px rgba(255, 180, 200, 0.6)",
                duration: 1.5,
                yoyo: true,
                repeat: 1,
                ease: "sine.inOut",
              },
              "-=0.8",
            )

            // GRADIENT LINE TWO
            .to(
              lineTwo,
              {
                backgroundPosition: "400% 50%",
                duration: 5,
                repeat: -1,
                ease: "none",
              },
              "-=1",
            )

            // 4. LOADING MUNCUL
            .to(
              loadingContainer,
              {
                opacity: 1,
                scale: 1,
                duration: 1.2,
                ease: "back.out(1.2)",
              },
              "+=0.3",
            )

            .to(
              loadingProgress,
              {
                width: "100%",
                duration: 5,
                ease: "power1.inOut",
              },
              "-=0.8",
            )

            .to(
              loadingText,
              {
                opacity: 1,
                duration: 1,
                ease: "sine.out",
              },
              "-=2",
            )

            .to(
              loadingText,
              {
                textShadow: "0 0 15px rgba(255, 150, 180, 0.8)",
                duration: 1.5,
                yoyo: true,
                repeat: 1,
                ease: "sine.inOut",
              },
              "-=1",
            )

            // BACKGROUND GRADIENT
            .to(
              "body",
              {
                backgroundPosition: "100% 100%",
                duration: 15,
                repeat: -1,
                yoyo: true,
                ease: "sine.inOut",
              },
              0,
            )

            // TULIP MUNCUL
            .to(
              ".tulip",
              {
                opacity: 0.35,
                duration: 1.5,
                stagger: 0.02,
                ease: "sine.out",
              },
              "-=4",
            )

            // EXIT KE HAL2.HTML
            .add(() => {
              setTimeout(() => {
                const exitTl = gsap.timeline();

                exitTl
                  .to(loadingContainer, {
                    opacity: 0,
                    scale: 0.8,
                    duration: 1.2,
                    ease: "sine.in",
                  })
                  .to(
                    lineTwo,
                    {
                      opacity: 0,
                      scale: 0.7,
                      filter: "blur(15px)",
                      duration: 1.5,
                      ease: "sine.in",
                    },
                    "-=0.8",
                  )
                  .to(
                    lineOne,
                    {
                      opacity: 0,
                      scale: 0.7,
                      filter: "blur(15px)",
                      duration: 1.5,
                      ease: "sine.in",
                    },
                    "-=1.2",
                  )
                  .to(
                    ".tulip, .particle",
                    {
                      opacity: 0,
                      duration: 1.5,
                      stagger: 0.01,
                      ease: "sine.in",
                    },
                    "-=1",
                  )
                  .to(
                    "body",
                    {
                      opacity: 0,
                      duration: 1.8,
                      ease: "power4.inOut",
                      onComplete: () => {
                        window.location.href = "hal2.html";
                      },
                    },
                    "-=1",
                  );
              }, 11000);
            });
        }

        // PARALLAX
        document.addEventListener("mousemove", (e) => {
          const x = (e.clientX / window.innerWidth - 0.5) * 15;
          const y = (e.clientY / window.innerHeight - 0.5) * 15;

          gsap.to(".greeting, .line-one, .line-two", {
            x: x * 0.3,
            y: y * 0.3,
            duration: 1.5,
            ease: "sine.out",
            overwrite: "auto",
          });

          gsap.to(".tulip", {
            x: x * 0.15,
            y: y * 0.15,
            duration: 2,
            ease: "sine.out",
          });
        });

        console.log("✨ SEMUA TEKS BENAR-BENAR DI TENGAH!");
      })();
    </script>
  </body>
</html>
